name: Build and Release ValDays

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Download and Replace App Icon
      run: |
        curl -L "https://res.cloudinary.com/dk6uwyjhq/image/upload/v1780241216/file_00000000338471fabaffa1762f54e60c_hygt9i.png" -o app_icon.png
        # Using a generic path replacement. In a real project, this would replace multiple sizes in mipmap folders
        mkdir -p app/src/main/res/mipmap-xxhdpi
        cp app_icon.png app/src/main/res/mipmap-xxhdpi/ic_launcher.png
        cp app_icon.png app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
        # Remove downloaded file
        rm app_icon.png

    - name: Generate Dummy Keystore for Signing
      run: |
        keytool -genkey -v -keystore release.jks -alias valdays_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass dummy_password -keypass dummy_password -dname "CN=ValDays, OU=ValDays, O=ValDays, L=Unknown, ST=Unknown, C=Unknown"
        echo "KEYSTORE_FILE=$(pwd)/release.jks" >> $GITHUB_ENV
        echo "KEYSTORE_PASSWORD=dummy_password" >> $GITHUB_ENV
        echo "KEY_ALIAS=valdays_alias" >> $GITHUB_ENV
        echo "KEY_PASSWORD=dummy_password" >> $GITHUB_ENV

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease -Pandroid.injected.signing.store.file=${{ env.KEYSTORE_FILE }} -Pandroid.injected.signing.store.password=${{ env.KEYSTORE_PASSWORD }} -Pandroid.injected.signing.key.alias=${{ env.KEY_ALIAS }} -Pandroid.injected.signing.key.password=${{ env.KEY_PASSWORD }}

    - name: Create Release and Upload APK
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/release/app-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
